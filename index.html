<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EcoTrace — Carbon Footprint Platform</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --green-50:#EAF3DE;--green-100:#C0DD97;--green-200:#97C459;--green-400:#639922;--green-600:#3B6D11;--green-800:#27500A;
    --teal-50:#E1F5EE;--teal-100:#9FE1CB;--teal-200:#5DCAA5;--teal-400:#1D9E75;--teal-600:#0F6E56;--teal-800:#085041;
    --amber-50:#FAEEDA;--amber-100:#FAC775;--amber-200:#EF9F27;--amber-400:#BA7517;--amber-800:#633806;
    --coral-50:#FAECE7;--coral-100:#F5C4B3;--coral-200:#F0997B;--coral-400:#D85A30;--coral-800:#4A1B0C;
    --gray-50:#F1EFE8;--gray-100:#D3D1C7;--gray-200:#B4B2A9;--gray-400:#888780;--gray-600:#5F5E5A;--gray-800:#444441;
    --blue-50:#E6F1FB;--blue-100:#B5D4F4;--blue-400:#378ADD;--blue-800:#0C447C;
    --bg:#fff;--bg2:#F8F9FA;--bg3:#F1F3F0;
    --text:#1a1a18;--text2:#5F5E5A;--text3:#888780;
    --border:rgba(0,0,0,0.1);--border2:rgba(0,0,0,0.18);
    --radius:8px;--radius-lg:12px;--radius-xl:16px;
    --font:'Inter',system-ui,sans-serif;
  }
  @media(prefers-color-scheme:dark){
    :root{
      --bg:#1a1c18;--bg2:#22251f;--bg3:#2a2e26;
      --text:#e8ead4;--text2:#9fa89a;--text3:#6b7566;
      --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.18);
    }
  }
  body{font-family:var(--font);background:var(--bg3);color:var(--text);min-height:100vh}
  a{color:inherit;text-decoration:none}
  button{cursor:pointer;font-family:var(--font)}
  input,select,textarea{font-family:var(--font)}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const {useState,useEffect,useRef,useCallback}=React;

const EMISSION_FACTORS={
  transport:{car_petrol:0.21,car_diesel:0.17,car_electric:0.05,motorcycle:0.11,bus:0.089,train:0.041,flight_domestic:0.255,flight_international:0.195},
  energy:{electricity:0.233,natural_gas:2.04,lpg:1.63,coal:2.42,solar:0,wind:0},
  food:{beef:27,lamb:39.2,pork:12.1,chicken:6.9,fish:6.1,dairy:3.2,eggs:4.8,vegetables:2.0,fruits:1.1,vegan:1.5},
  lifestyle:{new_clothing:10,streaming_hour:0.036,smartphone_year:70,laptop_year:300,flight_holiday:1.5}
};

const TIPS={
  transport:["Switch to public transport or carpooling","Cycle or walk for short trips","Consider an electric vehicle","Work from home 1-2 days per week","Combine errands into one trip"],
  energy:["Switch to a renewable energy tariff","Install LED bulbs throughout your home","Improve home insulation","Install a smart thermostat","Use appliances during off-peak hours"],
  food:["Try one meat-free day per week","Reduce beef and lamb consumption","Buy local and seasonal produce","Reduce food waste by meal planning","Choose plant-based alternatives"],
  lifestyle:["Buy second-hand clothing","Repair items instead of replacing","Stream in standard definition","Choose durable electronics","Offset unavoidable emissions"]
};

const COLORS={transport:"#639922",energy:"#1D9E75",food:"#BA7517",lifestyle:"#D85A30"};

function useLocalStorage(key,initial){
  const[val,setVal]=useState(()=>{try{const s=localStorage.getItem(key);return s?JSON.parse(s):initial}catch{return initial}});
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val))}catch{}},[key,val]);
  return[val,setVal];
}

function NavBar({page,setPage}){
  const tabs=[
    {id:"dashboard",icon:"🌍",label:"Dashboard"},
    {id:"calculator",icon:"🧮",label:"Calculator"},
    {id:"tracker",icon:"📊",label:"Tracker"},
    {id:"actions",icon:"✅",label:"Actions"},
    {id:"learn",icon:"📚",label:"Learn"}
  ];
  return React.createElement("nav",{style:{background:"var(--bg)",borderBottom:"0.5px solid var(--border)",position:"sticky",top:0,zIndex:100}},
    React.createElement("div",{style:{maxWidth:960,margin:"0 auto",display:"flex",alignItems:"center",gap:8,padding:"0 16px",overflowX:"auto"}},
      React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,paddingRight:16,borderRight:"0.5px solid var(--border)",marginRight:8,flexShrink:0}},
        React.createElement("span",{style:{fontSize:20}},"🌱"),
        React.createElement("span",{style:{fontWeight:600,fontSize:15,color:"var(--green-400)"},"whiteSpace":"nowrap"},"EcoTrace")
      ),
      tabs.map(t=>React.createElement("button",{
        key:t.id,
        onClick:()=>setPage(t.id),
        style:{
          display:"flex",alignItems:"center",gap:6,padding:"14px 12px",
          background:"none",border:"none",borderBottom:`2px solid ${page===t.id?"var(--green-400)":"transparent"}`,
          color:page===t.id?"var(--green-400)":"var(--text2)",fontWeight:page===t.id?500:400,
          fontSize:13,flexShrink:0,transition:"all 0.15s",cursor:"pointer"
        }
      },
        React.createElement("span",null,t.icon),
        React.createElement("span",null,t.label)
      ))
    )
  );
}

function MetricCard({label,value,unit,color,icon,sub}){
  return React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"16px 20px",borderLeft:`3px solid ${color||"var(--green-400)"}`}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}},
      React.createElement("div",null,
        React.createElement("p",{style:{fontSize:12,color:"var(--text3)",marginBottom:6}},[icon," ",label]),
        React.createElement("p",{style:{fontSize:26,fontWeight:600,color:"var(--text)",lineHeight:1}},value,React.createElement("span",{style:{fontSize:13,fontWeight:400,color:"var(--text2)",marginLeft:4}},unit))
      )
    ),
    sub&&React.createElement("p",{style:{fontSize:12,color:"var(--text3)",marginTop:6}},sub)
  );
}

function Dashboard({footprint,history,actions}){
  const chartRef=useRef(null);
  const chartInst=useRef(null);
  const total=Object.values(footprint).reduce((a,b)=>a+b,0);
  const avgUK=5.4;
  const completedActions=actions.filter(a=>a.done).length;
  const savings=actions.filter(a=>a.done).reduce((s,a)=>s+(a.saving||0),0);

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    const labels=Object.keys(footprint).map(k=>k.charAt(0).toUpperCase()+k.slice(1));
    const data=Object.values(footprint);
    const colors=Object.keys(footprint).map(k=>COLORS[k]||"#639922");
    chartInst.current=new Chart(chartRef.current,{
      type:"doughnut",
      data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.label}: ${ctx.parsed.toFixed(1)} tCO₂`}}}}
    });
    return()=>{if(chartInst.current)chartInst.current.destroy()};
  },[footprint]);

  const historyChartRef=useRef(null);
  const historyInst=useRef(null);
  useEffect(()=>{
    if(!historyChartRef.current||!history.length)return;
    if(historyInst.current)historyInst.current.destroy();
    const last7=history.slice(-7);
    historyInst.current=new Chart(historyChartRef.current,{
      type:"line",
      data:{
        labels:last7.map(h=>new Date(h.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short"})),
        datasets:[{label:"Total tCO₂e",data:last7.map(h=>+(h.total||0).toFixed(2)),borderColor:"#639922",backgroundColor:"rgba(99,153,34,0.1)",fill:true,tension:0.4,pointRadius:4,pointBackgroundColor:"#639922"}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v+"t"}}}}
    });
    return()=>{if(historyInst.current)historyInst.current.destroy()};
  },[history]);

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px 16px"}},
    React.createElement("h2",{style:{fontSize:22,fontWeight:600,marginBottom:4}},"Your carbon dashboard"),
    React.createElement("p",{style:{color:"var(--text2)",marginBottom:24,fontSize:14}},"Estimated annual carbon footprint based on your inputs"),

    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12,marginBottom:24}},
      React.createElement(MetricCard,{label:"Annual footprint",value:total.toFixed(1),unit:"tCO₂e",icon:"🌍",color:"#639922",sub:`${total>avgUK?"Above":"Below"} UK average of ${avgUK}t`}),
      React.createElement(MetricCard,{label:"vs UK average",value:`${((total/avgUK-1)*100).toFixed(0)}%`,unit:"",icon:"📉",color:total>avgUK?"#D85A30":"#1D9E75",sub:total>avgUK?"Room for improvement":"Great job!"}),
      React.createElement(MetricCard,{label:"CO₂ saved",value:savings.toFixed(2),unit:"tCO₂e",icon:"♻️",color:"#1D9E75",sub:`${completedActions} actions completed`}),
      React.createElement(MetricCard,{label:"Biggest source",value:Object.keys(footprint).reduce((a,b)=>footprint[a]>footprint[b]?a:b,"transport"),unit:"",icon:"🔍",color:"#BA7517",sub:`${Math.max(...Object.values(footprint)).toFixed(1)}t CO₂e/yr`})
    ),

    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}},
      React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"20px"}},
        React.createElement("p",{style:{fontSize:14,fontWeight:500,marginBottom:16}},"Breakdown by category"),
        React.createElement("div",{style:{height:200,position:"relative"}},
          React.createElement("canvas",{ref:chartRef,role:"img","aria-label":"Doughnut chart of carbon footprint by category"},"Carbon footprint breakdown")),
        React.createElement("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px 16px",marginTop:12}},
          Object.keys(footprint).map(k=>React.createElement("span",{key:k,style:{display:"flex",alignItems:"center",gap:5,fontSize:12,color:"var(--text2)"}},
            React.createElement("span",{style:{width:10,height:10,borderRadius:2,background:COLORS[k],flexShrink:0}}),
            `${k.charAt(0).toUpperCase()+k.slice(1)}: ${footprint[k].toFixed(1)}t`
          ))
        )
      ),
      React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"20px"}},
        React.createElement("p",{style:{fontSize:14,fontWeight:500,marginBottom:16}},"Footprint over time"),
        history.length>=2
          ?React.createElement("div",{style:{height:200,position:"relative"}},React.createElement("canvas",{ref:historyChartRef,role:"img","aria-label":"Line chart of footprint over time"},"Footprint trend"))
          :React.createElement("div",{style:{height:200,display:"flex",alignItems:"center",justifyContent:"center",color:"var(--text3)",fontSize:13,textAlign:"center",flexDirection:"column",gap:8}},
            React.createElement("span",{style:{fontSize:32}},"📈"),
            "Track your footprint a few times to see your trend"
          )
      )
    ),

    React.createElement("div",{style:{background:"var(--teal-50)",border:"0.5px solid var(--teal-100)",borderRadius:"var(--radius-lg)",padding:"20px"}},
      React.createElement("p",{style:{fontSize:14,fontWeight:500,color:"var(--teal-800)",marginBottom:8}},"💡 Top personalised action"),
      React.createElement("p",{style:{fontSize:13,color:"var(--teal-600)"}},
        footprint.food>1.5?"Reducing beef and lamb consumption once a week could save ~0.5 tCO₂e per year.":
        footprint.transport>2?"Switching 2 car trips a week to public transport could save ~0.3 tCO₂e per year.":
        footprint.energy>1.5?"Installing LED bulbs and smart thermostat could reduce energy emissions by 15%.":
        "You're doing well! Consider offsetting remaining emissions through verified carbon credits."
      )
    )
  );
}

function Calculator({footprint,setFootprint,addHistory}){
  const[tab,setTab]=useState("transport");
  const[vals,setVals]=useState({
    car_km:10000,car_type:"car_petrol",bus_km:0,train_km:0,flights:0,
    electricity_kwh:3000,gas_m3:0,heating:"electricity",
    beef_meals:2,chicken_meals:3,veg_meals:5,dairy_daily:1,
    new_clothes:5,streaming_hrs:2,devices:1
  });

  const calc=useCallback(()=>{
    const ef=EMISSION_FACTORS;
    const transport=(vals.car_km/1000)*ef.transport[vals.car_type]+(vals.bus_km/1000)*ef.transport.bus+(vals.train_km/1000)*ef.transport.train+vals.flights*ef.transport.flight_international*2;
    const energy=(vals.electricity_kwh/1000)*ef.energy.electricity+(vals.gas_m3/1000)*ef.energy.natural_gas;
    const food=(vals.beef_meals*52*ef.food.beef/1000)+(vals.chicken_meals*52*ef.food.chicken/1000)+(vals.veg_meals*52*ef.food.vegetables/1000)+(vals.dairy_daily*365*ef.food.dairy/1000);
    const lifestyle=(vals.new_clothes*ef.lifestyle.new_clothing/1000)+(vals.streaming_hrs*365*ef.lifestyle.streaming_hour/1000)+(vals.devices*ef.lifestyle.laptop_year/1000);
    return{transport:+transport.toFixed(3),energy:+energy.toFixed(3),food:+food.toFixed(3),lifestyle:+lifestyle.toFixed(3)};
  },[vals]);

  const update=(k,v)=>setVals(p=>({...p,[k]:isNaN(+v)?v:+v}));
  const save=()=>{
    const fp=calc();
    setFootprint(fp);
    addHistory({date:new Date().toISOString(),total:Object.values(fp).reduce((a,b)=>a+b,0),...fp});
    alert("Footprint saved! Check your dashboard.");
  };

  const tabs=[
    {id:"transport",icon:"🚗",label:"Transport"},
    {id:"energy",icon:"⚡",label:"Energy"},
    {id:"food",icon:"🍽️",label:"Food"},
    {id:"lifestyle",icon:"🛍️",label:"Lifestyle"}
  ];

  const preview=calc();

  const Row=({label,children,hint})=>React.createElement("div",{style:{marginBottom:16}},
    React.createElement("label",{style:{display:"block",fontSize:13,fontWeight:500,marginBottom:6,color:"var(--text2)"}},label,
      hint&&React.createElement("span",{style:{fontWeight:400,color:"var(--text3)",marginLeft:4}},hint)
    ),
    children
  );

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px 16px"}},
    React.createElement("h2",{style:{fontSize:22,fontWeight:600,marginBottom:4}},"Carbon calculator"),
    React.createElement("p",{style:{color:"var(--text2)",fontSize:14,marginBottom:24}},"Answer honestly — your data stays in your browser."),

    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"1fr 300px",gap:20,alignItems:"start"}},
      React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}},
        React.createElement("div",{style:{display:"flex",borderBottom:"0.5px solid var(--border)"}},
          tabs.map(t=>React.createElement("button",{
            key:t.id,onClick:()=>setTab(t.id),
            style:{flex:1,padding:"12px 8px",background:"none",border:"none",borderBottom:`2px solid ${tab===t.id?"var(--green-400)":"transparent"}`,
            color:tab===t.id?"var(--green-400)":"var(--text2)",fontSize:12,fontWeight:tab===t.id?500:400,cursor:"pointer"}
          },t.icon," ",t.label))
        ),
        React.createElement("div",{style:{padding:"20px"}},
          tab==="transport"&&React.createElement("div",null,
            React.createElement(Row,{label:"Car type"},
              React.createElement("select",{value:vals.car_type,onChange:e=>update("car_type",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}},
                React.createElement("option",{value:"car_petrol"},"Petrol car"),
                React.createElement("option",{value:"car_diesel"},"Diesel car"),
                React.createElement("option",{value:"car_electric"},"Electric car"),
                React.createElement("option",{value:"motorcycle"},"Motorcycle")
              )
            ),
            React.createElement(Row,{label:"Distance driven per year",hint:"km"},
              React.createElement("input",{type:"number",value:vals.car_km,onChange:e=>update("car_km",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Bus travel per year",hint:"km"},
              React.createElement("input",{type:"number",value:vals.bus_km,onChange:e=>update("bus_km",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Train travel per year",hint:"km"},
              React.createElement("input",{type:"number",value:vals.train_km,onChange:e=>update("train_km",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Return flights per year"},
              React.createElement("input",{type:"number",value:vals.flights,onChange:e=>update("flights",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            )
          ),
          tab==="energy"&&React.createElement("div",null,
            React.createElement(Row,{label:"Electricity use per year",hint:"kWh (avg UK home: 3,000-4,000 kWh)"},
              React.createElement("input",{type:"number",value:vals.electricity_kwh,onChange:e=>update("electricity_kwh",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Natural gas use per year",hint:"m³ (0 if not used)"},
              React.createElement("input",{type:"number",value:vals.gas_m3,onChange:e=>update("gas_m3",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            )
          ),
          tab==="food"&&React.createElement("div",null,
            React.createElement(Row,{label:"Beef/lamb meals per week"},
              React.createElement("input",{type:"number",min:0,max:21,value:vals.beef_meals,onChange:e=>update("beef_meals",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Chicken/fish meals per week"},
              React.createElement("input",{type:"number",min:0,max:21,value:vals.chicken_meals,onChange:e=>update("chicken_meals",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Vegetarian/vegan meals per week"},
              React.createElement("input",{type:"number",min:0,max:21,value:vals.veg_meals,onChange:e=>update("veg_meals",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Dairy servings per day"},
              React.createElement("input",{type:"number",min:0,max:10,value:vals.dairy_daily,onChange:e=>update("dairy_daily",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            )
          ),
          tab==="lifestyle"&&React.createElement("div",null,
            React.createElement(Row,{label:"New clothing items bought per year"},
              React.createElement("input",{type:"number",min:0,value:vals.new_clothes,onChange:e=>update("new_clothes",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Daily streaming hours (Netflix, YouTube, etc.)"},
              React.createElement("input",{type:"number",min:0,max:24,value:vals.streaming_hrs,onChange:e=>update("streaming_hrs",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            ),
            React.createElement(Row,{label:"Electronic devices replaced per year"},
              React.createElement("input",{type:"number",min:0,value:vals.devices,onChange:e=>update("devices",e.target.value),style:{width:"100%",padding:"8px 12px",border:"0.5px solid var(--border2)",borderRadius:"var(--radius)",background:"var(--bg)",color:"var(--text)",fontSize:14}})
            )
          )
        )
      ),

      React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:12}},
        React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"20px"}},
          React.createElement("p",{style:{fontSize:13,fontWeight:500,marginBottom:12}},"Live estimate"),
          React.createElement("div",{style:{textAlign:"center",marginBottom:16}},
            React.createElement("p",{style:{fontSize:40,fontWeight:600,color:"var(--green-400)",lineHeight:1}},
              Object.values(preview).reduce((a,b)=>a+b,0).toFixed(1)
            ),
            React.createElement("p",{style:{fontSize:13,color:"var(--text2)",marginTop:4}},"tonnes CO₂e / year")
          ),
          ["transport","energy","food","lifestyle"].map(cat=>React.createElement("div",{key:cat,style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
            React.createElement("span",{style:{fontSize:12,color:"var(--text2)",textTransform:"capitalize"}},[
              {transport:"🚗",energy:"⚡",food:"🍽️",lifestyle:"🛍️"}[cat]," ",cat
            ]),
            React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8}},
              React.createElement("div",{style:{width:80,height:6,background:"var(--bg3)",borderRadius:3,overflow:"hidden"}},
                React.createElement("div",{style:{width:`${Math.min(100,(preview[cat]/Object.values(preview).reduce((a,b)=>a+b,0.01))*100)}%`,height:"100%",background:COLORS[cat],borderRadius:3}})
              ),
              React.createElement("span",{style:{fontSize:12,fontWeight:500,minWidth:36,textAlign:"right"}},preview[cat].toFixed(2),"t")
            )
          )),
          React.createElement("button",{onClick:save,style:{width:"100%",marginTop:12,padding:"10px 0",background:"var(--green-400)",color:"#fff",border:"none",borderRadius:"var(--radius)",fontWeight:500,fontSize:14,cursor:"pointer"}},
            "Save to dashboard ✓"
          )
        ),

}

function Tracker({history}){
  const tableChartRef=useRef(null);
  const tableInst=useRef(null);
  useEffect(()=>{
    if(!tableChartRef.current||history.length<1)return;
    if(tableInst.current)tableInst.current.destroy();
    tableInst.current=new Chart(tableChartRef.current,{
      type:"bar",
      data:{
        labels:history.map(h=>new Date(h.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"})),
        datasets:[
          {label:"Transport",data:history.map(h=>+(h.transport||0).toFixed(2)),backgroundColor:COLORS.transport,stack:"a"},
          {label:"Energy",data:history.map(h=>+(h.energy||0).toFixed(2)),backgroundColor:COLORS.energy,stack:"a"},
          {label:"Food",data:history.map(h=>+(h.food||0).toFixed(2)),backgroundColor:COLORS.food,stack:"a"},
          {label:"Lifestyle",data:history.map(h=>+(h.lifestyle||0).toFixed(2)),backgroundColor:COLORS.lifestyle,stack:"a"}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${c.raw}t`}}},
        scales:{x:{stacked:true,ticks:{maxRotation:45}},y:{stacked:true,ticks:{callback:v=>v+"t"}}}
      }
    });
    return()=>{if(tableInst.current)tableInst.current.destroy()};
  },[history]);

  const trend=history.length>=2?history[history.length-1].total-history[0].total:0;

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px 16px"}},
    React.createElement("h2",{style:{fontSize:22,fontWeight:600,marginBottom:4}},"Footprint tracker"),
    React.createElement("p",{style:{color:"var(--text2)",fontSize:14,marginBottom:24}},"Your progress over time"),
    history.length===0
      ?React.createElement("div",{style:{textAlign:"center",padding:"60px 20px",color:"var(--text3)"}},
        React.createElement("div",{style:{fontSize:48,marginBottom:12}},"📊"),
        React.createElement("p",{style:{fontSize:16,fontWeight:500,marginBottom:8}},"No data yet"),
        React.createElement("p",{style:{fontSize:14}},"Use the calculator to log your first footprint estimate.")
      )
      :React.createElement("div",null,
        React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(160px,1fr))",gap:12,marginBottom:20}},
          React.createElement(MetricCard,{label:"Entries logged",value:history.length,unit:"",icon:"📝",color:"#378ADD"}),
          React.createElement(MetricCard,{label:"Latest estimate",value:history[history.length-1].total.toFixed(1),unit:"t CO₂e",icon:"🌍",color:"#639922"}),
          React.createElement(MetricCard,{label:"Overall trend",value:trend>0?"+"+trend.toFixed(2):trend.toFixed(2),unit:"t",icon:trend<=0?"📉":"📈",color:trend<=0?"#1D9E75":"#D85A30",sub:trend<=0?"Improving":"Needs attention"}),
          React.createElement(MetricCard,{label:"Best recorded",value:Math.min(...history.map(h=>h.total)).toFixed(1),unit:"t CO₂e",icon:"🏆",color:"#BA7517"})
        ),
        React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",padding:"20px",marginBottom:20}},
          React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}},
            React.createElement("p",{style:{fontSize:14,fontWeight:500}},"Stacked emissions over time"),
            React.createElement("div",{style:{display:"flex",gap:12}},
              ["transport","energy","food","lifestyle"].map(k=>React.createElement("span",{key:k,style:{display:"flex",alignItems:"center",gap:4,fontSize:11,color:"var(--text2)"}},
                React.createElement("span",{style:{width:8,height:8,borderRadius:1,background:COLORS[k]}}),
                k.charAt(0).toUpperCase()+k.slice(1)
              ))
            )
          ),
          React.createElement("div",{style:{height:280,position:"relative"}},
            React.createElement("canvas",{ref:tableChartRef,role:"img","aria-label":"Stacked bar chart of carbon footprint over time"},"Footprint history")
          )
        ),
        React.createElement("div",{style:{background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",overflow:"hidden"}},
          React.createElement("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:13}},
            React.createElement("thead",null,
              React.createElement("tr",{style:{background:"var(--bg2)"}},
                ["Date","Transport","Energy","Food","Lifestyle","Total"].map(h=>
                  React.createElement("th",{key:h,style:{padding:"10px 16px",textAlign:"left",fontWeight:500,color:"var(--text2)",fontSize:12,borderBottom:"0.5px solid var(--border)"}},h)
                )
              )
            ),
            React.createElement("tbody",null,
              [...history].reverse().map((h,i)=>React.createElement("tr",{key:i,style:{borderBottom:"0.5px solid var(--border)"}},
                React.createElement("td",{style:{padding:"10px 16px",color:"var(--text2)"}},new Date(h.date).toLocaleDateString("en-GB")),
                ["transport","energy","food","lifestyle"].map(k=>React.createElement("td",{key:k,style:{padding:"10px 16px"}},(h[k]||0).toFixed(2),"t")),
                React.createElement("td",{style:{padding:"10px 16px",fontWeight:500,color:"var(--green-400)"}},(h.total||0).toFixed(2),"t")
              ))
            )
          )
        )
      )
  );
}

function Actions({footprint,actions,setActions}){
  const allActions=[
    {id:1,cat:"transport",title:"Use public transport twice a week",desc:"Replace 2 car trips per week with bus or train.",saving:0.3,effort:"low",impact:"high"},
    {id:2,cat:"transport",title:"Walk or cycle for trips under 2 km",desc:"Short car trips are disproportionately polluting — cold engines burn more fuel.",saving:0.2,effort:"low",impact:"medium"},
    {id:3,cat:"transport",title:"Try one car-free month",desc:"Challenge yourself to avoid the car for a full month and track the savings.",saving:0.15,effort:"medium",impact:"medium"},
    {id:4,cat:"energy",title:"Switch to a renewable energy tariff",desc:"Many suppliers now offer 100% renewable electricity at no premium.",saving:0.5,effort:"low",impact:"high"},
    {id:5,cat:"energy",title:"Install a smart thermostat",desc:"Reduces heating bills by 10-15% and cuts gas consumption significantly.",saving:0.3,effort:"medium",impact:"high"},
    {id:6,cat:"energy",title:"Replace all bulbs with LEDs",desc:"LED bulbs use 75% less energy than traditional incandescents.",saving:0.1,effort:"low",impact:"low"},
    {id:7,cat:"food",title:"Go meat-free one day a week",desc:"Cutting beef and lamb consumption is one of the highest-impact dietary changes.",saving:0.5,effort:"low",impact:"high"},
    {id:8,cat:"food",title:"Reduce food waste",desc:"Plan meals weekly, use leftovers, and compost scraps.",saving:0.2,effort:"medium",impact:"medium"},
    {id:9,cat:"food",title:"Choose local and seasonal produce",desc:"Imported out-of-season produce has a much higher carbon footprint.",saving:0.15,effort:"low",impact:"medium"},
    {id:10,cat:"lifestyle",title:"Buy second-hand clothing",desc:"Fast fashion has a huge environmental cost — second-hand reduces this.",saving:0.2,effort:"low",impact:"medium"},
    {id:11,cat:"lifestyle",title:"Repair rather than replace",desc:"Extending the life of electronics and appliances saves embodied carbon.",saving:0.3,effort:"medium",impact:"high"},
    {id:12,cat:"lifestyle",title:"Reduce streaming quality",desc:"HD streaming uses 3x more data than SD — small habit, meaningful over time.",saving:0.05,effort:"low",impact:"low"}
  ];

  const biggestCat=Object.keys(footprint).reduce((a,b)=>footprint[a]>footprint[b]?a:b,"transport");
  const sorted=[...allActions].sort((a,b)=>{
    if(a.cat===biggestCat&&b.cat!==biggestCat)return -1;
    if(b.cat===biggestCat&&a.cat!==biggestCat)return 1;
    if(a.impact==="high"&&b.impact!=="high")return -1;
    if(b.impact==="high"&&a.impact!=="high")return 1;
    return 0;
  });

  const toggle=id=>setActions(prev=>prev.map(a=>a.id===id?{...a,done:!a.done}:a));
  const getAction=id=>actions.find(a=>a.id===id)||{done:false};

  const impactColors={high:"var(--green-400)",medium:"var(--amber-400)",low:"var(--gray-400)"};
  const catIcons={transport:"🚗",energy:"⚡",food:"🍽️",lifestyle:"🛍️"};

  const saved=actions.filter(a=>a.done).reduce((s,a)=>{
    const found=allActions.find(x=>x.id===a.id);
    return s+(found?.saving||0);
  },0);

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px 16px"}},
    React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:24}},
      React.createElement("div",null,
        React.createElement("h2",{style:{fontSize:22,fontWeight:600,marginBottom:4}},"Action plan"),
        React.createElement("p",{style:{color:"var(--text2)",fontSize:14}},"Personalised actions sorted by impact for your profile")
      ),
      React.createElement("div",{style:{textAlign:"right"}},
        React.createElement("p",{style:{fontSize:28,fontWeight:600,color:"var(--green-400)",lineHeight:1}},saved.toFixed(2),"t"),
        React.createElement("p",{style:{fontSize:12,color:"var(--text3)"}})
      )
    ),
    React.createElement("div",{style:{display:"flex",flexDirection:"column",gap:10}},
      sorted.map(action=>React.createElement("div",{
        key:action.id,
        style:{
          background:"var(--bg)",border:"0.5px solid var(--border)",borderRadius:"var(--radius-lg)",
          padding:"16px 20px",display:"flex",gap:16,alignItems:"flex-start",
          opacity:getAction(action.id).done?0.6:1,transition:"opacity 0.2s"
        }
      },
        React.createElement("button",{
          onClick:()=>{toggle(action.id)},
          style:{
            width:22,height:22,borderRadius:4,flexShrink:0,marginTop:2,cursor:"pointer",
            background:getAction(action.id).done?"var(--green-400)":"none",
            border:`1.5px solid ${getAction(action.id).done?"var(--green-400)":"var(--border2)"}`,
            color:"#fff",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center"
          }
        },getAction(action.id).done?"✓":""),
        React.createElement("div",{style:{flex:1}},
          React.createElement("div",{style:{display:"flex",alignItems:"center",gap:8,marginBottom:4}},
            React.createElement("span",{style:{fontSize:14,fontWeight:500,textDecoration:getAction(action.id).done?"line-through":"none",color:getAction(action.id).done?"var(--text3)":"var(--text)"}},action.title),
            React.createElement("span",{style:{fontSize:10,padding:"2px 8px",borderRadius:10,background:action.cat==="transport"?"var(--green-50)":action.cat==="energy"?"var(--teal-50)":action.cat==="food"?"var(--amber-50)":"var(--coral-50)",color:action.cat==="transport"?"var(--green-600)":action.cat==="energy"?"var(--teal-600)":action.cat==="food"?"var(--amber-400)":"var(--coral-400)"}},catIcons[action.cat]," ",action.cat)
          ),
          React.createElement("p",{style:{fontSize:13,color:"var(--text2)",marginBottom:8}},action.desc),
          React.createElement("div",{style:{display:"flex",gap:12}},
            React.createElement("span",{style:{fontSize:11,color:impactColors[action.impact],fontWeight:500}},"●  ",action.impact," impact"),
            React.createElement("span",{style:{fontSize:11,color:"var(--text3)"}},"saves ~",action.saving,"t CO₂e/yr"),
            React.createElement("span",{style:{fontSize:11,color:"var(--text3)"}},"effort: ",action.effort)
          )
        )
      ))
    )
  );
}

function Learn(){
  const articles=[
    {title:"What is a carbon footprint?",icon:"🌍",time:"3 min",content:"A carbon footprint is the total amount of greenhouse gases — primarily carbon dioxide and methane — generated by our actions. The average global carbon footprint is around 4.7 tonnes of CO₂ equivalent per person per year. To avoid the worst impacts of climate change, we need to reduce this to under 2 tonnes by 2050."},
    {title:"Why transport matters",icon:"🚗",time:"4 min",content:"Transport accounts for about 27% of global CO₂ emissions. Private cars are the biggest contributor, with aviation a close second. Switching to electric vehicles, public transport, cycling, or walking can dramatically cut your personal footprint. A round-trip flight from London to New York emits roughly 1.7 tonnes of CO₂ per passenger."},
    {title:"Food and the climate",icon:"🍽️",time:"5 min",content:"The global food system is responsible for about 26% of greenhouse gas emissions. Beef and lamb have by far the highest footprint — producing 1 kg of beef emits around 60 kg of CO₂ equivalent, compared to just 1.6 kg for vegetables. Choosing a plant-rich diet is one of the most impactful personal choices you can make."},
    {title:"Home energy and heating",icon:"⚡",time:"4 min",content:"Heating and cooling homes accounts for around 13% of UK greenhouse gas emissions. Switching to a heat pump, improving insulation, and moving to a renewable electricity tariff are among the most effective actions. The average UK home emits about 2.4 tonnes of CO₂ from energy use annually."},
    {title:"Understanding carbon offsets",icon:"🌱",time:"4 min",content:"Carbon offsets allow you to compensate for unavoidable emissions by funding projects that reduce CO₂ elsewhere — like reforestation or renewable energy. However, they should not replace direct reductions. Look for certified offsets (Gold Standard, VCS) and treat offsetting as a supplement, not a substitute."},
    {title:"The 1.5°C target explained",icon:"🌡️",time:"5 min",content:"The Paris Agreement set a goal of limiting global warming to 1.5°C above pre-industrial levels. Each additional 0.5°C dramatically increases the risk of extreme weather, sea level rise, and ecosystem collapse. To stay within 1.5°C, global emissions need to reach net zero by around 2050."}
  ];

  const[open,setOpen]=useState(null);

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"24px 16px"}},
    React.createElement("h2",{style:{fontSize:22,fontWeight:600,marginBottom:4}},"Learn"),
    React.createElement("p",{style:{color:"var(--text2)",fontSize:14,marginBottom:24}},"Understanding the science behind your footprint"),
    React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))",gap:12}},
      articles.map((a,i)=>React.createElement("div",{
        key:i,
        style:{background:"var(--bg)",border:`0.5px solid ${open===i?"var(--green-400)":"var(--border)"}`,borderRadius:"var(--radius-lg)",padding:"20px",cursor:"pointer",transition:"border-color 0.2s"},
        onClick:()=>setOpen(open===i?null:i)
      },
        React.createElement("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:open===i?12:0}},
          React.createElement("div",null,
            React.createElement("span",{style:{fontSize:24}}),
            React.createElement("p",{style:{fontSize:14,fontWeight:500,marginTop:8}},[a.icon," ",a.title]),
            React.createElement("p",{style:{fontSize:12,color:"var(--text3)",marginTop:4}},"📖 ",a.time," read")
          ),
          React.createElement("span",{style:{fontSize:18,color:"var(--text3)",transition:"transform 0.2s",transform:open===i?"rotate(180deg)":"none"}},"⌄")
        ),
        open===i&&React.createElement("p",{style:{fontSize:13,color:"var(--text2)",lineHeight:1.7,marginTop:8,borderTop:"0.5px solid var(--border)",paddingTop:12}},a.content)
      ))
    ),
    React.createElement("div",{style:{marginTop:24,background:"var(--green-50)",border:"0.5px solid var(--green-100)",borderRadius:"var(--radius-lg)",padding:20}},
      React.createElement("p",{style:{fontSize:14,fontWeight:500,color:"var(--green-800)",marginBottom:8}},"📊 Key facts at a glance"),
      React.createElement("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(180px,1fr))",gap:12}},
        [
          {label:"Global average",value:"4.7t",sub:"CO₂e per person/yr"},
          {label:"UK average",value:"5.4t",sub:"CO₂e per person/yr"},
          {label:"Paris target 2030",value:"2.3t",sub:"CO₂e per person/yr"},
          {label:"Net-zero target",value:"2050",sub:"Global goal year"}
        ].map((f,i)=>React.createElement("div",{key:i,style:{textAlign:"center"}},
          React.createElement("p",{style:{fontSize:24,fontWeight:600,color:"var(--green-400)"}}),
          React.createElement("p",{style:{fontSize:22,fontWeight:600,color:"var(--green-400)"}},[f.value]),
          React.createElement("p",{style:{fontSize:12,color:"var(--green-600)",fontWeight:500}},f.label),

function App(){
  const[page,setPage]=useState("dashboard");
  const[footprint,setFootprint]=useLocalStorage("ecotrace_fp",{transport:2.1,energy:1.2,food:1.8,lifestyle:0.3});
  const[history,setHistory]=useLocalStorage("ecotrace_history",[]);
  const[actions,setActions]=useLocalStorage("ecotrace_actions",[{id:1,done:false},{id:2,done:false},{id:3,done:false},{id:4,done:false},{id:5,done:false},{id:6,done:false},{id:7,done:false},{id:8,done:false},{id:9,done:false},{id:10,done:false},{id:11,done:false},{id:12,done:false}]);

  const addHistory=entry=>setHistory(prev=>[...prev,entry]);

  const pages={

    tracker:React.createElement(Tracker,{history}),

  return React.createElement("div",null,

}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(App));
</script>
